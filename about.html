<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="description" content="Katia Koval - Contemporary Art. Professional paintings, yacht series, auto series. Available for purchase.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>About | Katia Koval</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Mono', monospace; padding: 0 60px; background-color: #ffffff; color: #000000; }
        .line { width: 100%; height: 1px; background-color: #000000; }
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 30px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Стилі для лого */
        .logo-img { width: 120px; height: auto; display: block; cursor: pointer; }
        
        /* Головний контейнер навігації */
        header nav { display: flex; align-items: center; justify-self: center; position: relative; }
        header nav a { text-decoration: none; color: #000000; margin: 0 20px; letter-spacing: 2px; }
        
        .dropdown { display: inline-block; cursor: pointer; }
        
        /* Випадаюче меню з безшовним мостом для курсора */
        .dropdown-content { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 50%; 
            transform: translateX(-50%); 
            padding-top: 25px; 
            z-index: 10; 
        }
        
        /* Внутрішній блок обгортки з рамкою */
        .dropdown-inner {
            background: #fff; 
            border: 1px solid #000; 
            padding: 15px 35px; 
            white-space: nowrap;
        }
        
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-inner a { margin: 0 15px; color: #000; text-decoration: none; }
        
        .header-empty { justify-self: end; font-size: 11px; letter-spacing: 1px; cursor: pointer; }
        
        /* Сітка для сторінки About */
        .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin: 80px auto; max-width: 1200px; align-items: center; }
        .about-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 400; letter-spacing: 1px; }
        .about-text p { margin-top: 25px; font-size: 15px; line-height: 1.8; text-transform: none; letter-spacing: 0.5px; }

        /* Підвал з відносним позиціонуванням */
        footer { padding: 60px 0; display: flex; justify-content: space-between; align-items: center; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; position: relative; }
        
        /* Блок копірайту та умов зліва */
        .footer-left { display: flex; flex-direction: column; gap: 8px; }
        .footer-left a { color: #000000; text-decoration: none; }
        .footer-left a:hover { text-decoration: underline; }

        /* Платіжні іконки зафіксовані строго по центру підвалу */
        .payment-icons { display: flex; gap: 20px; align-items: center; color: #000000; font-size: 22px; position: absolute; left: 50%; transform: translateX(-50%); }
        
        /* Соцмережі чітко справа */
        .social-icons { display: flex; gap: 25px; align-items: center; }
        .social-icons a { color: #000000; text-decoration: none; font-size: 22px; display: inline-block; transition: opacity 0.2s ease; }
        .social-icons a:hover { opacity: 0.6; }

        /* Мобільна адаптивність (для екранів менше 768px) */
        @media (max-width: 768px) {
            body { 
                padding: 0 20px; 
            }
            header { 
                display: flex; 
                flex-direction: column; 
                gap: 15px; 
                padding: 20px 0; 
            }
            header nav { 
                flex-wrap: wrap; 
                justify-content: center; 
            }
            header nav a { 
                margin: 5px 10px; 
            }
            .header-empty { 
                justify-self: center; 
            }
            .about-grid { 
                grid-template-columns: 1fr; 
                gap: 40px; 
                margin: 40px auto; 
            }
            .about-text h1 {
                font-size: 32px;
                text-align: center;
            }
            .about-text p {
                font-size: 14px;
                margin-top: 15px;
            }
            footer { 
                flex-direction: column; 
                gap: 25px; 
                text-align: center; 
                padding: 40px 0; 
            }
            .footer-left {
                align-items: center;
            }
            .payment-icons { 
                position: static; 
                transform: none; 
                justify-content: center; 
                flex-wrap: wrap; 
            }
            .social-icons { 
                justify-content: center; 
            }
        }
    </style>
</head>
<body>
    <div class="line"></div>
    <header>
        <a href="index.html">
            <img src="лого.jpg" alt="KovalArt Logo" class="logo-img">
        </a>
        <nav>
            <a href="index.html" data-i18n="home">Home</a>
            <a href="about.html" data-i18n="about">About</a>
            <a href="available.html" data-i18n="available">Available</a>
            <div class="dropdown">
                <span data-i18n="gallery">Gallery <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown-content">
                    <div class="dropdown-inner">
                        <a href="auto-series.html" data-i18n="auto">Auto Series</a>
                        <a href="yacht-series.html" data-i18n="yacht">Yacht Series</a>
                    </div>
                </div>
            </div>
            <a href="contact.html" data-i18n="contact">Contact</a>
        </nav>
        <div class="header-empty">
            <span onclick="setLanguage('ua')">UA</span> / <span onclick="setLanguage('en')">EN</span>
        </div>
    </header>
    <div class="line"></div>
    
    <main class="about-grid">
        <img src="Foto.jpg" style="width:100%;" alt="Katia Koval">
        <div class="about-text">
            <h1 data-i18n="about_title">Katia Koval</h1>
            <p data-i18n="about_p1"></p>
            <p data-i18n="about_p2"></p>
        </div>
    </main>

    <div class="line"></div>
    <footer>
        <div class="footer-left">
            <div id="footer-text">© 2026 KOVALART STORE. ALL RIGHTS RESERVED.</div>
            <a href="terms.html" data-i18n="terms">Terms & Conditions</a>
        </div>
        
        <div class="payment-icons">
            <i class="fa-brands fa-cc-visa" title="Visa"></i>
            <i class="fa-brands fa-cc-mastercard" title="Mastercard"></i>
            <i class="fa-brands fa-apple-pay" title="Apple Pay"></i>
            <i class="fa-brands fa-google-pay" title="Google Pay"></i>
            <i class="fa-brands fa-cc-paypal" title="PayPal"></i>
            <i class="fa-solid fa-credit-card" title="Payoneer"></i>
        </div>
        
        <div class="social-icons">
            <a href="https://www.instagram.com/kkoval.art?igsh=MW9oZzA1NnUwMjNpNg==" target="_blank" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.etsy.com/shop/KovalArtStore" target="_blank" title="Etsy">
                <i class="fa-solid fa-store"></i>
            </a>
        </div>
    </footer>

    <script>
        const translations = {
            'ua': {
                'home': 'Головна',
                'about': 'Про автора',
                'available': 'В наявності',
                'gallery': 'Галерея',
                'auto': 'Авто серія',
                'yacht': 'Яхт серія',
                'contact': 'Контакти',
                'terms': 'Умови використання',
                'footer': '© 2026 KOVALART STORE. УСІ ПРАВА ЗАХИЩЕНІ.',
                'about_title': 'Катерина Коваль',
                'about_p1': 'Катерина Коваль — сучасна українська художниця, для якої живопис став справою всього життя. Пройшовши тривалий творчий шлях та опанувавши безліч художніх технік, вона знайшла своє істинне покликання в текстурному живописі. Робота з акрилом та об\'ємними пастами дозволяє Катерині створювати живі, динамічні полотна, де кожен мазок має свій характер, глибину та характерний рельєф.',
                'about_p2': 'Сьогодні художниця працює у власній затишній студії в Україні, створюючи монументальні серії робіт, присвячені швидкості автомобілів та величі морських яхт. За її плечима — понад 500 створених полотен та більше сотні щасливих колекціонерів і вдячних клієнтів по всьому світу. Завдяки міжнародній платформі Etsy, її фактурне мистецтво прикрашає приватні інтер\'єри в різних куточках планети, даруючи людям естетичне задоволення та силу справжнього текстурного живопису.'
            },
            'en': {
                'home': 'Home',
                'about': 'About',
                'available': 'Available',
                'gallery': 'Gallery',
                'auto': 'Auto Series',
                'yacht': 'Yacht Series',
                'contact': 'Contact',
                'terms': 'Terms & Conditions',
                'footer': '© 2026 KOVALART STORE. ALL RIGHTS RESERVED.',
                'about_title': 'Katia Koval',
                'about_p1': 'Katia Koval is a contemporary Ukrainian artist for whom painting has become a lifelong calling. Having explored an extensive artistic path and mastered numerous techniques, she found her true passion in textured art. Working with acrylics and impasto mediums allows Katia to create vivid, dynamic canvases where every single brushstroke possesses its own character, depth, and tangible relief.',
                'about_p2': 'Today, she works from her private art studio in Ukraine, creating powerful series dedicated to the speed of automobiles and the elegance of marine yachts. With over 500 original artworks created and more than a hundred happy collectors worldwide, her art truly knows no borders. Through her international Etsy store, Katia’s textured paintings enrich private interiors across the globe, bringing aesthetic pleasure and the raw energy of modern textured art into people\'s homes.'
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('selectedLanguage', lang);
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    const icon = el.querySelector('i');
                    if (icon) {
                        const iconHTML = icon.outerHTML;
                        el.innerHTML = translations[lang][key] + " " + iconHTML;
                    } else {
                        el.textContent = translations[lang][key];
                    }
                }
            });

            const footerTextEl = document.getElementById('footer-text');
            if (footerTextEl && translations[lang]['footer']) {
                footerTextEl.textContent = translations[lang]['footer'];
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedLang = localStorage.getItem('selectedLanguage') || 'en';
            setLanguage(savedLang);
        });
    </script>
</body>
</html>
