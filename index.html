<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="description" content="Katia Koval - Contemporary Art. Professional paintings, yacht series, auto series. Available for purchase.">
    <link class="icon" href="favicon.ico" type="image/x-icon">
    <title>KovalArt Store | Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Mono', monospace; background-color: #ffffff; color: #000000; padding: 0 60px; }
        .line { width: 100%; height: 1px; background-color: #000000; }
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 30px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Стилі для лого */
        .logo-img { width: 120px; height: auto; display: block; cursor: pointer; }
        
        /* Головний контейнер навігації */
        header nav { display: flex; align-items: center; justify-self: center; position: relative; }
        header nav a { text-decoration: none; color: #000000; margin: 0 20px; letter-spacing: 2px; }
        
        .dropdown { display: inline-block; cursor: pointer; }
        
        /* Випадаюче меню з безшовним мостом для курсора */
        .dropdown-content { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 50%; 
            transform: translateX(-50%); 
            padding-top: 25px; 
            z-index: 10; 
        }
        
        /* Внутрішній блок обгортки з рамкою */
        .dropdown-inner {
            background: #fff; 
            border: 1px solid #000; 
            padding: 15px 35px; 
            white-space: nowrap;
        }
        
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-inner a { margin: 0 15px; color: #000; text-decoration: none; display: inline-block; }
        
        .header-empty { justify-self: end; font-size: 11px; letter-spacing: 1px; cursor: pointer; }
        .hero { max-width: 1100px; margin: 60px auto; height: 75vh; background: url('Golovne.jpg') no-repeat center center; background-size: contain; }
        
        /* Підвал з відносним позиціонуванням */
        footer { padding: 60px 0; display: flex; justify-content: space-between; align-items: center; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; position: relative; }
        footer a { color: #000000; text-decoration: underline; transition: opacity 0.2s; }
        footer a:hover { opacity: 0.6; }
        
        /* Платіжні іконки зафіксовані строго по центру підвалу */
        .payment-icons { display: flex; gap: 20px; align-items: center; color: #000000; font-size: 22px; position: absolute; left: 50%; transform: translateX(-50%); }
        
        /* Соцмережі чітко справа */
        .social-icons { display: flex; gap: 25px; align-items: center; }
        .social-icons a { color: #000000; text-decoration: none; font-size: 22px; display: inline-block; transition: opacity 0.2s ease; }
        .social-icons a:hover { opacity: 0.6; }

        /* Мобільна адаптивність */
        @media (max-width: 768px) {
            body { padding: 0 20px; }
            header { display: flex; flex-direction: column; gap: 15px; padding: 20px 0; }
            header nav { flex-wrap: wrap; justify-content: center; }
            header nav a { margin: 5px 10px; }
            .header-empty { justify-self: center; }
            .hero { margin: 30px auto; height: 50vh; }
            footer { flex-direction: column; gap: 25px; text-align: center; padding: 40px 0; }
            .payment-icons { position: static; transform: none; justify-content: center; }
            .social-icons { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="line"></div>
    <header>
        <a href="index.html">
            <img src="лого.jpg" alt="KovalArt Logo" class="logo-img">
        </a>
        <nav>
            <a href="index.html" data-i18n="home">Home</a>
            
            <div class="dropdown">
                <span data-i18n="gallery">Gallery <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown-content">
                    <div class="dropdown-inner">
                        <a href="auto-series.html" data-i18n="auto">Auto Series</a>
                        <a href="yacht-series.html" data-i18n="yacht">Yacht Series</a>
                        <a href="others.html" data-i18n="others">Other Artworks</a>
                    </div>
                </div>
            </div>

            <a href="about.html" data-i18n="about">About</a>
            <a href="available.html" data-i18n="available">Available</a>
            <a href="contact.html" data-i18n="contact">Contact</a>
        </nav>
        <div class="header-empty">
            <span onclick="setLanguage('ua')">UA</span> / <span onclick="setLanguage('en')">EN</span>
        </div>
    </header>
    <div class="line"></div>
    <div class="hero"></div>
    <div class="line"></div>
    <footer>
        <div id="footer-text">© 2026 KOVALART STORE. ALL RIGHTS RESERVED. | <a href="terms.html">Terms & Conditions</a></div>
        
        <div class="payment-icons">
            <i class="fa-brands fa-cc-visa" title="Visa"></i>
            <i class="fa-brands fa-cc-mastercard" title="Mastercard"></i>
            <i class="fa-brands fa-apple-pay" title="Apple Pay"></i>
            <i class="fa-brands fa-google-pay" title="Google Pay"></i>
            <i class="fa-brands fa-cc-paypal" title="PayPal"></i>
            <i class="fa-solid fa-credit-card" title="Payoneer"></i>
        </div>
        
        <div class="social-icons">
            <a href="https://www.instagram.com/kkoval.art?igsh=MW9oZzA1NnUwMjNpNg==" target="_blank" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.etsy.com/shop/KovalArtStore" target="_blank" title="Etsy">
                <i class="fa-solid fa-store"></i>
            </a>
        </div>
    </footer>

    <script>
        const translations = {
            'ua': {
                'home': 'Головна',
                'about': 'Про автора',
                'available': 'В наявності',
                'contact': 'Контакти',
                'gallery': 'Галерея',
                'auto': 'Авто серія',
                'yacht': 'Яхт серія',
                'others': 'Інші роботи',
                'footer': '© 2026 KOVALART STORE. УСІ ПРАВА ЗАХИЩЕНІ. | '
            },
            'en': {
                'home': 'Home',
                'about': 'About',
                'available': 'Available',
                'contact': 'Contact',
                'gallery': 'Gallery',
                'auto': 'Auto Series',
                'yacht': 'Yacht Series',
                'others': 'Other Artworks',
                'footer': '© 2026 KOVALART STORE. ALL RIGHTS RESERVED. | '
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('selectedLanguage', lang);
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    const icon = el.querySelector('i');
                    if (icon) {
                        const iconHTML = icon.outerHTML;
                        el.innerHTML = translations[lang][key] + " " + iconHTML;
                    } else {
                        el.textContent = translations[lang][key];
                    }
                }
            });

            const footerTextEl = document.getElementById('footer-text');
            if (footerTextEl && translations[lang]['footer']) {
                const linkText = lang === 'ua' ? 'Правила та умови' : 'Terms & Conditions';
                footerTextEl.innerHTML = translations[lang]['footer'] + `<a href="terms.html">${linkText}</a>`;
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedLang = localStorage.getItem('selectedLanguage') || 'en';
            setLanguage(savedLang);
        });
    </script>
</body>
</html>
