<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="description" content="Katia Koval - Contemporary Art. Professional paintings, yacht series, auto series. Available for purchase.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Terms & Conditions | Katia Koval</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Mono', monospace; background-color: #ffffff; color: #000000; padding: 0 60px; }
        .line { width: 100%; height: 1px; background-color: #000000; margin: 0; }
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 30px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Стилі для лого */
        .logo-img { width: 120px; height: auto; display: block; cursor: pointer; }
        
        /* Головний контейнер навігації */
        header nav { display: flex; align-items: center; justify-self: center; position: relative; }
        header nav a { text-decoration: none; color: #000000; margin: 0 20px; letter-spacing: 2px; }
        
        .dropdown { display: inline-block; cursor: pointer; }
        
        /* Випадаюче меню з безшовним мостом для курсора */
        .dropdown-content { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 50%; 
            transform: translateX(-50%); 
            padding-top: 25px; 
            z-index: 10; 
        }
        
        /* Внутрішній блок обгортки з рамкою */
        .dropdown-inner {
            background: #fff; 
            border: 1px solid #000; 
            padding: 15px 35px; 
            white-space: nowrap;
        }
        
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-inner a { margin: 0 15px; color: #000; text-decoration: none; display: inline-block; }
        
        .header-empty { justify-self: end; font-size: 11px; letter-spacing: 1px; cursor: pointer; }
        
        /* Стилі для контенту умов */
        .terms-container { max-width: 800px; margin: 0 auto; padding: 60px 0; min-height: 60vh; }
        .terms-title { font-size: 32px; font-family: 'Cormorant Garamond', serif; font-weight: 400; margin-bottom: 40px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        
        .terms-section { margin-bottom: 35px; }
        .terms-section h3 { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 400; }
        .terms-section p, .terms-section ul { font-size: 14px; line-height: 1.6; color: #333; list-style-position: inside; }
        .terms-section ul li { margin-bottom: 8px; }

        /* Підвал з відносним позиціонуванням */
        footer { padding: 60px 0; display: flex; justify-content: space-between; align-items: center; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; position: relative; }
        
        /* Блок копірайту та умов зліва */
        .footer-left { display: flex; flex-direction: column; gap: 8px; }
        .footer-left a { color: #000000; text-decoration: none; }
        .footer-left a:hover { text-decoration: underline; }

        /* Платіжні іконки зафіксовані строго по центру підвалу */
        .payment-icons { display: flex; gap: 20px; align-items: center; color: #000000; font-size: 22px; position: absolute; left: 50%; transform: translateX(-50%); }
        
        /* Соцмережі чітко справа */
        .social-icons { display: flex; gap: 25px; align-items: center; }
        .social-icons a { color: #000000; text-decoration: none; font-size: 22px; display: inline-block; transition: opacity 0.2s ease; }
        .social-icons a:hover { opacity: 0.6; }

        /* Мобільна адаптивність (для екранів менше 768px) */
        @media (max-width: 768px) {
            body { padding: 0 20px; }
            header { display: flex; flex-direction: column; gap: 15px; padding: 20px 0; }
            header nav { flex-wrap: wrap; justify-content: center; }
            header nav a { margin: 5px 10px; }
            .header-empty { justify-self: center; }
            
            .terms-container { padding: 40px 0; }
            .terms-title { font-size: 26px; margin-bottom: 30px; }
            
            footer { flex-direction: column; gap: 25px; text-align: center; padding: 40px 0; }
            .footer-left { align-items: center; }
            .payment-icons { position: static; transform: none; justify-content: center; flex-wrap: wrap; }
            .social-icons { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="line"></div>
    <header>
        <a href="index.html">
            <img src="лого.jpg" alt="KovalArt Logo" class="logo-img">
        </a>
        <nav>
            <a href="index.html" data-i18n="home">Home</a>
            <a href="about.html" data-i18n="about">About</a>
            <a href="available.html" data-i18n="available">Available</a>
            <div class="dropdown">
                <span data-i18n="gallery">Gallery <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown-content">
                    <div class="dropdown-inner">
                        <a href="auto-series.html" data-i18n="auto">Auto Series</a>
                        <a href="yacht-series.html" data-i18n="yacht">Yacht Series</a>
                    </div>
                </div>
            </div>
            <a href="contact.html" data-i18n="contact">Contact</a>
        </nav>
        <div class="header-empty">
            <span onclick="setLanguage('ua')">UA</span> / <span onclick="setLanguage('en')">EN</span>
        </div>
    </header>
    <div class="line"></div>
    
    <main class="terms-container">
        <h1 class="terms-title" data-i18n="terms_title">Terms & Conditions</h1>
        
        <div id="terms-content">
            </div>
    </main>

    <div class="line"></div>
    <footer>
        <div class="footer-left">
            <div id="footer-text">© 2026 KOVALART STORE. ALL RIGHTS RESERVED.</div>
            <a href="terms.html" data-i18n="terms" style="font-weight: bold;">Terms & Conditions</a>
        </div>
        
        <div class="payment-icons">
            <i class="fa-brands fa-cc-visa" title="Visa"></i>
            <i class="fa-brands fa-cc-mastercard" title="Mastercard"></i>
            <i class="fa-brands fa-apple-pay" title="Apple Pay"></i>
            <i class="fa-brands fa-google-pay" title="Google Pay"></i>
            <i class="fa-brands fa-cc-paypal" title="PayPal"></i>
            <i class="fa-solid fa-credit-card" title="Payoneer"></i>
        </div>
        
        <div class="social-icons">
            <a href="https://www.instagram.com/kkoval.art?igsh=MW9oZzA1NnUwMjNpNg==" target="_blank" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.etsy.com/shop/KovalArtStore" target="_blank" title="Etsy">
                <i class="fa-solid fa-store"></i>
            </a>
        </div>
    </footer>

    <script>
        const translations = {
            'ua': {
                'home': 'Головна',
                'about': 'Про автора',
                'available': 'В наявності',
                'gallery': 'Галерея',
                'auto': 'Авто серія',
                'yacht': 'Яхт серія',
                'contact': 'Контакти',
                'terms': 'Умови використання',
                'terms_title': 'Правила та умови',
                'footer': '© 2026 KOVALART STORE. УСІ ПРАВА ЗАХИЩЕНІ.',
                'html_content': `
                    <div class="terms-section">
                        <h3>1. Загальні положення</h3>
                        <p>Ласкаво просимо до KovalArt Store. Купуючи оригінальні картини чи замовляючи індивідуальні роботи на цьому веб-сайті, ви погоджуєтеся з наведеними нижче правилами.</p>
                    </div>
                    <div class="terms-section">
                        <h3>2. Оплата</h3>
                        <p>Всі платежі обробляються безпечно. Робота над замовленням або відправка готового виробу починається лише після 100% підтвердження оплати.</p>
                    </div>
                    <div class="terms-section">
                        <h3>3. Доставка та терміни</h3>
                        <ul>
                            <li><strong>Картини в наявності:</strong> Всі товари, які є в наявності, обробляються та відправляються протягом 7 робочих днів після підтвердження оплати.</li>
                            <li><strong>Картини під замовлення (Made to Order):</strong> Терміни створення та відправки індивідуальних замовлень залежать від розміру та складності роботи і обговорюються з художником в індивідуальному порядку.</li>
                            <li><strong>Методи доставки:</strong> Міжнародна доставка здійснюється авіапоштою з трек-номером (через національного поштового оператора). Після прибуття у вашу країну посилка доставляється вашою місцевою державною поштовою службою. Покупець несе відповідальність за будь-які митні збори у своїй країні.</li>
                        </ul>
                    </div>
                    <div class="terms-section">
                        <h3>4. Повернення та обмін</h3>
                        <ul>
                            <li><strong>Оригінали та індивідуальні замовлення:</strong> Через унікальну природу оригінальних картин та робіт під замовлення, всі продажі є остаточними. Повернення коштів чи обмін у випадку, якщо покупець передумав, не передбачено.</li>
                            <li><strong>Пошкодження при транспортуванні:</strong> Якщо картина була пошкоджена під час доставки, будь ласка, зв'яжіться з нами протягом 48 годин з моменту отримання, додавши фотографії пошкоджень та упаковки для вирішення ситуації.</li>
                        </ul>
                    </div>
                    <div class="terms-section">
                        <h3>5. Авторське право</h3>
                        <p>Художник зберігає всі права на копіювання та тиражування всіх створених художніх робіт. Купівля картини не передає покупцеві жодних авторських прав на комерційне використання чи репродукцію.</p>
                    </div>
                `
            },
            'en': {
                'home': 'Home',
                'about': 'About',
                'available': 'Available',
                'gallery': 'Gallery',
                'auto': 'Auto Series',
                'yacht': 'Yacht Series',
                'contact': 'Contact',
                'terms': 'Terms & Conditions',
                'terms_title': 'Terms & Conditions',
                'footer': '© 2026 KOVALART STORE. ALL RIGHTS RESERVED.',
                'html_content': `
                    <div class="terms-section">
                        <h3>1. General Overview</h3>
                        <p>Welcome to KovalArt Store. By purchasing original paintings or commissioning custom artworks on this website, you agree to comply with and be bound by the following terms and conditions.</p>
                    </div>
                    <div class="terms-section">
                        <h3>2. Payment</h3>
                        <p>All payments are processed securely. Artworks will only be prepared for shipping or customized after 100% payment confirmation.</p>
                    </div>
                    <div class="terms-section">
                        <h3>3. Shipping & Delivery</h3>
                        <ul>
                            <li><strong>Available Artworks:</strong> All items currently in stock are processed and shipped within 7 business days after payment confirmation.</li>
                            <li><strong>Custom Orders (Made to Order):</strong> The creation and shipping timeline for custom or personalized artworks depends on the size and complexity of the piece and will be discussed individually with the artist.</li>
                            <li><strong>Delivery Methods:</strong> We ship internationally via International Tracked Airmail (National Postal Operator). Once the package reaches your country, it will be delivered by your local state postal service. Buyers are responsible for any customs and import taxes that may apply.</li>
                        </ul>
                    </div>
                    <div class="terms-section">
                        <h3>4. Returns & Refunds</h3>
                        <ul>
                            <li><strong>Original Art & Custom Orders:</strong> Due to the unique nature of original artwork and custom commissions, all sales are final. We do not accept returns, refunds, or exchanges if you simply change your mind.</li>
                            <li><strong>Damaged Items:</strong> In the unlikely event that your artwork arrives damaged during transit, please contact us within 48 hours of delivery with photos of the damage and packaging so we can resolve the issue.</li>
                        </ul>
                    </div>
                    <div class="terms-section">
                        <h3>5. Copyright & Intellectual Property</h3>
                        <p>The artist retains all reproduction and copyrights to the artworks created. The purchase of a painting does not transfer any copyright or commercial reproduction rights to the buyer.</p>
                    </div>
                `
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('selectedLanguage', lang);
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    const icon = el.querySelector('i');
                    if (icon) {
                        const iconHTML = icon.outerHTML;
                        el.innerHTML = translations[lang][key] + " " + iconHTML;
                    } else {
                        el.textContent = translations[lang][key];
                    }
                }
            });

            // Оновлення тексту в підвалі
            const footerTextEl = document.getElementById('footer-text');
            if (footerTextEl && translations[lang]['footer']) {
                footerTextEl.textContent = translations[lang]['footer'];
            }

            // Рендеринг основного контенту умов використання
            const termsContentEl = document.getElementById('terms-content');
            if (termsContentEl && translations[lang]['html_content']) {
                termsContentEl.innerHTML = translations[lang]['html_content'];
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedLang = localStorage.getItem('selectedLanguage') || 'en';
            setLanguage(savedLang);
        });
    </script>
</body>
</html>
