<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="description" content="Katia Koval - Contemporary Art. Professional paintings, yacht series, auto series. Available for purchase.">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Terms & Conditions | Katia Koval</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Mono', monospace; background-color: #ffffff; color: #000000; padding: 0 60px; }
        .line { width: 100%; height: 1px; background-color: #000000; margin: 0; }
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 30px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Стилі для лого */
        .logo-img { width: 120px; height: auto; display: block; cursor: pointer; }
        
        /* Головний контейнер навігації */
        header nav { display: flex; align-items: center; justify-self: center; position: relative; }
        header nav a { text-decoration: none; color: #000000; margin: 0 20px; letter-spacing: 2px; }
        
        .dropdown { display: inline-block; cursor: pointer; }
        
        /* Випадаюче меню з безшовним мостом для курсора */
        .dropdown-content { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 50%; 
            transform: translateX(-50%); 
            padding-top: 25px; 
            z-index: 10; 
        }
        
        /* Внутрішній блок обгортки з рамкою */
        .dropdown-inner {
            background: #fff; 
            border: 1px solid #000; 
            padding: 15px 35px; 
            white-space: nowrap;
        }
        
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-inner a { margin: 0 15px; color: #000; text-decoration: none; display: inline-block; }
        
        .header-empty { justify-self: end; font-size: 11px; letter-spacing: 1px; cursor: pointer; }
        
        /* Стилі для контенту умов */
        .terms-container { max-width: 800px; margin: 0 auto; padding: 60px 0; min-height: 60vh; }
        .terms-title { font-size: 32px; font-family: 'Cormorant Garamond', serif; font-weight: 400; margin-bottom: 40px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        
        .terms-section { margin-bottom: 35px; }
        .terms-section h3 { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 400; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .terms-section p, .terms-section ul { font-size: 14px; line-height: 1.6; color: #333; list-style-position: inside; text-align: justify; }
        .terms-section ul li { margin-bottom: 8px; }

        /* Підвал з відносним позиціонуванням */
        footer { padding: 60px 0; display: flex; justify-content: space-between; align-items: center; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; position: relative; }
        
        /* Блок копірайту та умов зліва */
        .footer-left { display: flex; flex-direction: column; gap: 8px; }
        .footer-left a { color: #000000; text-decoration: none; }
        .footer-left a:hover { text-decoration: underline; }

        /* Платіжні іконки зафіксовані строго по центру підвалу */
        .payment-icons { display: flex; gap: 20px; align-items: center; color: #000000; font-size: 22px; position: absolute; left: 50%; transform: translateX(-50%); }
        
        /* Соцмережі чітко справа */
        .social-icons { display: flex; gap: 25px; align-items: center; }
        .social-icons a { color: #000000; text-decoration: none; font-size: 22px; display: inline-block; transition: opacity 0.2s ease; }
        .social-icons a:hover { opacity: 0.6; }

        /* Мобільна адаптивність */
        @media (max-width: 768px) {
            body { padding: 0 20px; }
            header { display: flex; flex-direction: column; gap: 15px; padding: 20px 0; }
            header nav { flex-wrap: wrap; justify-content: center; }
            header nav a { margin: 5px 10px; }
            .header-empty { justify-self: center; }
            
            .terms-container { padding: 40px 0; }
            .terms-title { font-size: 26px; margin-bottom: 30px; }
            
            footer { flex-direction: column; gap: 25px; text-align: center; padding: 40px 0; }
            .footer-left { align-items: center; }
            .payment-icons { position: static; transform: none; justify-content: center; flex-wrap: wrap; }
            .social-icons { justify-content: center; }
        }
    </style>
</head>
<body>

                        </ul>
                    </div>
                    <div class="terms-section">
                        <h3>5. Авторське право</h3>
                        <p>Художник зберігає всі права на копіювання та тиражування створених художніх робіт. Купівля картини не передає покупцеві комерційних авторських прав чи прав на репродукцію.</p>
                    </div>
                    <div class="terms-section">
                        <h3>6. Юридичні реквізити компанії</h3>
                        <p><strong>Фізична особа-підприємець Коваль Наталія Дмитрівна</strong><br>
                        РНОКПП (ІПН): 2732313829<br>
                        Юридична адреса: Україна, Чернівецька обл., м. Чернівці, вул. 2-й пр. Мукачівський, 9<br>
                        Електронна пошта: applekovall5@gmail.com<br>
                        Телефон: 0958950778</p>
                    </div>
                `
            },
            'en': {
                'home': 'Home',
                'about': 'About',
                'available': 'Available',
                'gallery': 'Gallery',
                'auto': 'Auto Series',
                'yacht': 'Yacht Series',
                'others': 'Other Artworks',
                'contact': 'Contact',
                'terms': 'Terms & Conditions',
                'terms_title': 'Terms & Conditions',
                'footer': '© 2026 KOVALART STORE. ALL RIGHTS RESERVED.',
                'html_content': `
                    <div class="terms-section">
                        <h3>1. General Overview</h3>
                        <p>This contract is an official and public offer (terms of sale) of FOP Koval Nataliia Dmytrivna (hereinafter — the Seller) for any individual or legal entity (hereinafter — the Buyer) to conclude a contract of sale of goods remotely via the online store at kovalart.com.</p>
                    </div>
                    <div class="terms-section">

                    <div class="terms-section">
                        <h3>3. Shipping & Delivery</h3>
                        <ul>
                            <li><strong>Available Artworks:</strong> Items currently in stock are processed and shipped within 7 business days after payment confirmation. Shipping within Ukraine is handled by "Nova Poshta".</li>

                            <li><strong>International Delivery:</strong> Shipped via Tracked Airmail. Buyers are responsible for any customs duties or import taxes that may apply in their country.</li>
                        </ul>
                    </div>
                    <div class="terms-section">
                        <h3>4. Returns & Refunds</h3>
                        <ul>
                            <li><strong>Original Artworks:</strong> In accordance with the Law of Ukraine "On Protection of Consumer Rights", the Buyer has the right to return or exchange goods of proper quality within 14 days of receipt, provided that their commercial appearance and qualities are fully preserved.</li>
                            <li><strong>Transit Damage:</strong> If the artwork arrives damaged, please contact us within 48 hours of delivery with photos of the damage and packaging.</li>
                        </ul>
                    </div>
                    <div class="terms-section">
                        <h3>5. Copyright & Intellectual Property</h3>
                        <p>The artist retains all reproduction and copyrights to the artworks created. The purchase of a painting does not transfer any commercial copyrights or reproduction rights to the buyer.</p>
                    </div>
                    <div class="terms-section">
                        <h3>6. Legal & Contact Details</h3>
                        <p><strong>FOP Koval Nataliia Dmytrivna</strong><br>
                        Tax ID (RNOKPP): 2732313829<br>
                        Registered Address: 9, 2nd Mukachivskyi proizd, Chernivtsi, Chernivtsi Oblast, Ukraine<br>
                        Email: applekovall5@gmail.com<br>
                        Phone: 0958950778</p>
                    </div>
                `
            }
        };

        function setLanguage(lang) {
            localStorage.setItem('selectedLanguage', lang);
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    const icon = el.querySelector('i');
                    if (icon) {
                        const iconHTML = icon.outerHTML;
                        el.innerHTML = translations[lang][key] + " " + iconHTML;
                    } else {
                        el.textContent = translations[lang][key];
                    }
                }
            });

            // Оновлення тексту в підвалі
            const footerTextEl = document.getElementById('footer-text');
            if (footerTextEl && translations[lang]['footer']) {
                footerTextEl.textContent = translations[lang]['footer'];
            }

            // Рендеринг основного контенту умов використання
            const termsContentEl = document.getElementById('terms-content');
            if (termsContentEl && translations[lang]['html_content']) {
                termsContentEl.innerHTML = translations[lang]['html_content'];
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedLang = localStorage.getItem('selectedLanguage') || 'en';
            setLanguage(savedLang);
        });
    </script>
</body>
</html>
